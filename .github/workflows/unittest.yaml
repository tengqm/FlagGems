name: unit-test

on:
  workflow_dispatch:

  push:
    branches: [ "master" ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  prerocess:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
      pr_id: ${{ steps.get-pr-id.outputs.PR_ID }}
    steps:
      - id: changed-files
        uses: tj-actions/changed-files@v47
      - id: get-pr-id
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_ID=${{ github.event.pull_request.number }}
          elif [ "${{ github.event_name }}" == "push" ]; then
            PR_NUMBER=$(git log -1 --pretty=format:'%s' | grep -oE '#[0-9]+' | grep -oE '[0-9]+')
            PR_ID=${PR_NUMBER}
          fi
          echo "PR_ID=${PR_ID}" >> "$GITHUB_OUTPUT"

      - id: wait-for-triage
        uses: ArcticLampyrid/action-wait-for-workflow@v1
        with:
          workflow: .github/workflows/triage.yaml

  build-doc:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'documentation')
    uses: ./.github/workflows/mkdocs.yaml

  cpp-op:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'ops/cpp')
    uses: ./.github/workflows/cpp-op-test.yaml

  blas-op:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'tests')
    concurrency:
      group: blas-op-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: blas-op-test.sh

  quick-cpu-op:
    needs: wait-triage
    # NOTE: This contains a temporary hack to skip this job for PRs from FODC contest.
    if: |
      contains(github.event.pull_request.labels.*.name, 'tests') &&
      ! contains(github.event.pull_request.labels.*.name, 'competition')
    concurrency:
      group: op-test-quick-cpu-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: op-test-quick-cpu.sh

  pointwise-op:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'tests')
    concurrency:
      group: pointwise-op-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: pointwise-op-test.sh

  reduction-op:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'tests')
    concurrency:
      group: reduction-op-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: reduction-op-test.sh

  special-op:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'tests')
    concurrency:
      group: special-op-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: special-op-test.sh

  utils:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'tests')"
    concurrency:
      group: op-utils-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: op-utils-test.sh

  examples:
    needs: wait-triage
    if: contains(github.event.pull_request.labels.*.name, 'tests')
    concurrency:
      group: examples-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/op-test.yaml
    with:
      pr_id: ${{ needs.wait-triage.outputs.pr_id }}
      script_path: examples-test.sh

  backend-nvidia:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'vendor/NVIDIA')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: nvidia
      runner_label: hopper
      gpu_check_script: tools/gpu_check.sh
      test_script: tools/run_backend_tests_nvidia.sh

  backend-ascend:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'vendor/Ascend')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: ascend
      runner_label: ascend
      gpu_check_script: tools/gpu_check_ascend.sh
      test_script: tools/run_backend_tests.sh

  backend-iluvatar:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'vendor/Iluvatar')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: iluvatar
      runner_label: iluvatar
      gpu_check_script: tools/gpu_check_iluvatar.sh
      test_script: tools/run_backend_tests.sh

  backend-metax:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'vendor/MetaX')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: metax
      runner_label: metax
      test_script: tools/run_backend_tests_metax.sh

  backend-moore:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'vendor/MooreThreads')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: moore
      runner_label: mthreadsCI
      gpu_check_script: tools/gpu_check_moore.sh
      test_script: tools/run_backend_tests.sh

  alpha-ops:
    needs: wait-triage
    if: "contains(github.event.pull_request.labels.*.name, 'ops/alpha')"
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: nvidia
      runner_label: hopper
      gpu_check_script: tools/gpu_check.sh
      test_script: tools/experimental-op-test.sh
      changed_files: ${{ needs.wait-triage.outputs.changed_files }}

